<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ainekio Control Login</title>
    <link rel="stylesheet" href="/assets/dashboard.css">
    <script src="/assets/dashboard.js" defer></script>
  </head>
  <body class="login-page">
    <main class="login-shell" aria-labelledby="login-title">
      <section class="login-panel">
        <div class="brand-mark" aria-hidden="true">A</div>
        <p class="product-name">Ainekio</p>
        <h1 id="login-title">Body Control</h1>
        <form id="login-form" class="login-form">
          <label for="password">Operator password</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            minlength="12"
            maxlength="256"
            required
            autofocus
          >
          <button type="submit" class="primary-command">Sign in</button>
          <p id="login-error" class="form-error" role="alert" hidden></p>
        </form>
      </section>
    </main>
  </body>
</html>
